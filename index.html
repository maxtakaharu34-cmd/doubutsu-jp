<script>
(()=>{
'use strict';
const SHARE_URL='https://maxtakaharu34-cmd.github.io/doubutsu-jp/';
const ANIMALS=[
{nm:'ライオン',em:'🦁',tag:'王者の風格',desc:'頼りがいのあるリーダータイプ。決断力と行動力で周りを引っ張る。',traits:['リーダー','勇敢','プライド','行動派'],compat:'チーター・ペガサス'},

{nm:'チーター',em:'🐆',tag:'スピードスター',desc:'瞬発力と直感で勝負する。短期決戦に強いタイプ。',traits:['スピード','直感','瞬発力','飽き性'],compat:'ライオン・虎'},
{nm:'狼',em:'🐺',tag:'孤高の戦略家',desc:'群れず、自分のペースで深く考える。仲間を見つけると最強。',traits:['戦略','一途','慎重','孤独耐性'],compat:'ペガサス・狸'},
{nm:'虎',em:'🐯',tag:'情熱の獅子奮迅',desc:'燃え上がる情熱と圧倒的なパワー。一度決めたら止まらない。',traits:['情熱','パワー','頑固','負けず嫌い'],compat:'チーター・象'},
{nm:'象',em:'🐘',tag:'頼れる大黒柱',desc:'おっとりして見えて芯が強い。長期戦で勝つタイプ。',traits:['温厚','記憶力','忍耐','大物'],compat:'虎・コアラ'},
{nm:'コアラ',em:'🐨',tag:'癒しのマスコット',desc:'のんびりマイペース。周りを和ませる天性のヒーラー。',traits:['癒し','マイペース','感受性','省エネ'],compat:'象・ひつじ'},
{nm:'ひつじ',em:'🐑',tag:'みんなの人気者',desc:'優しさと協調性で誰からも好かれる。集団生活が得意。',traits:['協調','優しい','人気者','八方美人'],compat:'コアラ・たぬき'},
{nm:'たぬき',em:'🦝',tag:'愛されキャラ',desc:'ムードメーカー。可愛がられる才能と人懐っこさ。',traits:['愛され','明るい','人脈','要領'],compat:'狼・ひつじ'},
{nm:'こじか',em:'🦌',tag:'純粋なロマン派',desc:'真面目で純粋。傷つきやすいけど一途な恋をする。',traits:['純粋','繊細','一途','ロマン'],compat:'猿・パンダ'},
{nm:'猿',em:'🐵',tag:'器用なエンタメ',desc:'明るく好奇心旺盛。何でもこなす器用さ。',traits:['好奇心','器用','賑やか','短期記憶'],compat:'こじか・ペンギン'},
{nm:'ペンギン',em:'🐧',tag:'よちよち癒し系',desc:'真面目でコツコツ。仲間思いで仕事熱心。',traits:['真面目','努力','仲間思い','保守的'],compat:'猿・パンダ'}
];
const $=(id)=>document.getElementById(id);
function fillSel(id,from,to,suf){const s=$(id);for(let i=from;i<=to;i++){const o=document.createElement('option');o.value=i;o.textContent=i+suf;s.appendChild(o)}}
fillSel('y',1950,2025,'年');fillSel('m',1,12,'月');fillSel('d',1,31,'日');
const today=new Date();$('y').value=today.getFullYear()-25;$('m').value=today.getMonth()+1;$('d').value=today.getDate();
let lastA=null;
function go(){
  const y=parseInt($('y').value),m=parseInt($('m').value),d=parseInt($('d').value);
  let h=y*10000+m*100+d;
  h=((h*16777619)^0x811c9dc5)>>>0;
  const a=ANIMALS[h%ANIMALS.length];
  $('em').textContent=a.em;$('nm').textContent=a.nm;$('tag').textContent=a.tag;$('desc').textContent=a.desc;
  const t=$('traits');while(t.firstChild)t.removeChild(t.firstChild);
  a.traits.forEach(x=>{const s=document.createElement('span');s.textContent=x;t.appendChild(s)});
  const c=$('compat');while(c.firstChild)c.removeChild(c.firstChild);
  c.appendChild(document.createTextNode('相性◎: '));
  const b=document.createElement('b');b.textContent=a.compat;c.appendChild(b);
  $('result').classList.add('show');
  $('btn-share').disabled=false;
  lastA=a;
  fanfare();
}
let ac=null;const en=()=>{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();return ac};
const beep=(f,d,t='triangle',g=.13)=>{const a=en();const o=a.createOscillator();const gn=a.createGain();o.type=t;o.frequency.value=f;gn.gain.value=g;gn.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);o.connect(gn).connect(a.destination);o.start();o.stop(a.currentTime+d)};
const fanfare=()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.18),i*100))};
$('btn-go').addEventListener('click',()=>{en();go()});
$('btn-share').addEventListener('click',()=>{
  if(!lastA)return;
  const txt=`動物占い: ${lastA.em} ${lastA.nm}「${lastA.tag}」 #動物占い`;
  window.open(`https://x.com/intent/post?text=${encodeURIComponent(txt)}&url=${encodeURIComponent(SHARE_URL)}`,'_blank','noopener,noreferrer');
});
})();
