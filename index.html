<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#fef3c7" />
<title>動物占い</title>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+P+One&family=Kosugi+Maru&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box}html,body{margin:0;padding:0;height:100%;overflow:hidden}
body{font-family:"Kosugi Maru",system-ui,sans-serif;color:#3a2a1c;background:linear-gradient(180deg,#fef3c7,#fde68a);touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent}
#app{display:flex;flex-direction:column;height:100dvh;padding:14px;gap:10px;max-width:480px;margin:0 auto}
.title{font-family:"Mochiy Pop P One",sans-serif;font-size:24px;color:#d97706;-webkit-text-stroke:2.5px #fff;paint-order:stroke fill;text-shadow:3px 3px 0 #3a2a1c;text-align:center;margin:6px 0;transform:rotate(-2deg)}
.input-card{background:#fff;border:3px solid #3a2a1c;border-radius:14px;padding:14px;box-shadow:3px 3px 0 #3a2a1c;display:flex;flex-direction:column;gap:8px}
.input-card label{font-size:11px;font-weight:bold;color:#d97706}
.dob-row{display:flex;gap:6px}
.dob-row select{flex:1;background:#fff5e0;border:2px solid #3a2a1c;border-radius:8px;padding:8px;font-size:14px}
.btn-row{display:flex;gap:8px}
.btn-row button{flex:1;background:#d97706;color:#fff;border:3px solid #3a2a1c;padding:12px;font-family:"Mochiy Pop P One",sans-serif;font-size:14px;border-radius:12px;cursor:pointer;box-shadow:3px 3px 0 #3a2a1c}
.btn-row button:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #3a2a1c}
.result{flex:1;min-height:0;background:#fff;border:3px solid #3a2a1c;border-radius:18px;padding:16px;box-shadow:4px 4px 0 #3a2a1c;overflow-y:auto;display:none;flex-direction:column;align-items:center;gap:10px}
.result.show{display:flex}
.result .em{font-size:80px;line-height:1;animation:bounce 1.2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.result .nm{font-family:"Mochiy Pop P One",sans-serif;font-size:22px;color:#d97706}
.result .tag{font-size:11px;background:#fef3c7;border:1.5px solid #3a2a1c;border-radius:999px;padding:3px 10px}
.result .desc{font-size:13px;line-height:1.7;text-align:center}
.result .traits{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.result .traits span{background:#fde68a;border:1.5px solid #3a2a1c;border-radius:999px;padding:3px 8px;font-size:11px}
.result .compat{margin-top:6px;font-size:12px;text-align:center;line-height:1.6}
.result .compat b{color:#d97706}
.actions{display:flex;gap:8px;justify-content:center}
.actions button{flex:1;background:#fff;color:#3a2a1c;border:3px solid #3a2a1c;padding:10px;font-family:"Mochiy Pop P One",sans-serif;font-size:12px;border-radius:12px;cursor:pointer;box-shadow:2px 2px 0 #3a2a1c}
.actions .share{background:#1da1f2;color:#fff}
.actions button:disabled{opacity:.4}
.actions button:active{transform:translate(2px,2px);box-shadow:0 0 0 #3a2a1c}
</style>
</head>
<body>
<div id="app">
<h1 class="title">動物占い 🦁</h1>
<div class="input-card">
  <label>生年月日</label>
  <div class="dob-row">
    <select id="y"></select>
    <select id="m"></select>
    <select id="d"></select>
  </div>
  <div class="btn-row">
    <button id="btn-go">🔮 占う</button>
  </div>
</div>
<div class="result" id="result">
  <div class="em" id="em">🦁</div>
  <div class="nm" id="nm">—</div>
  <div class="tag" id="tag">—</div>
  <div class="desc" id="desc">—</div>
  <div class="traits" id="traits"></div>
  <div class="compat" id="compat">—</div>
</div>
<div class="actions">
  <button id="btn-share" class="share" disabled>🔗 シェア</button>
</div>
</div>
<script>
(()=>{
'use strict';
const SHARE_URL='https://maxtakaharu34-cmd.github.io/doubutsu-jp/';
const ANIMALS=[
{nm:'ライオン',em:'🦁',tag:'王者の風格',desc:'頼りがいのあるリーダータイプ。決断力と行動力で周りを引っ張る。',traits:['リーダー','勇敢','プライド','行動派'],compat:'チーター・ペガサス'},
{nm:'ペガサス',em:'🦄',tag:'自由な天才',desc:'発想力と独創性で道を切り開く。束縛を嫌う風来坊タイプ。',traits:['天才肌','自由人','独創','気分屋'],compat:'ライオン・狼'},
{nm:'チーター',em:'🐆',tag:'スピードスター',desc:'瞬発力と直感で勝負する。短期決戦に強いタイプ。',traits:['スピード','直感','瞬発力','飽き性'],compat:'ライオン・虎'},
{nm:'狼',em:'🐺',tag:'孤高の戦略家',desc:'群れず、自分のペースで深く考える。仲間を見つけると最強。',traits:['戦略','一途','慎重','孤独耐性'],compat:'ペガサス・狸'},
{nm:'虎',em:'🐯',tag:'情熱の獅子奮迅',desc:'燃え上がる情熱と圧倒的なパワー。一度決めたら止まらない。',traits:['情熱','パワー','頑固','負けず嫌い'],compat:'チーター・象'},
{nm:'象',em:'🐘',tag:'頼れる大黒柱',desc:'おっとりして見えて芯が強い。長期戦で勝つタイプ。',traits:['温厚','記憶力','忍耐','大物'],compat:'虎・コアラ'},
{nm:'コアラ',em:'🐨',tag:'癒しのマスコット',desc:'のんびりマイペース。周りを和ませる天性のヒーラー。',traits:['癒し','マイペース','感受性','省エネ'],compat:'象・ひつじ'},
{nm:'ひつじ',em:'🐑',tag:'みんなの人気者',desc:'優しさと協調性で誰からも好かれる。集団生活が得意。',traits:['協調','優しい','人気者','八方美人'],compat:'コアラ・たぬき'},
{nm:'たぬき',em:'🦝',tag:'愛されキャラ',desc:'ムードメーカー。可愛がられる才能と人懐っこさ。',traits:['愛され','明るい','人脈','要領'],compat:'狼・ひつじ'},
{nm:'こじか',em:'🦌',tag:'純粋なロマン派',desc:'真面目で純粋。傷つきやすいけど一途な恋をする。',traits:['純粋','繊細','一途','ロマン'],compat:'猿・パンダ'},
{nm:'猿',em:'🐵',tag:'器用なエンタメ',desc:'明るく好奇心旺盛。何でもこなす器用さ。',traits:['好奇心','器用','賑やか','短期記憶'],compat:'こじか・ペンギン'},
{nm:'ペンギン',em:'🐧',tag:'よちよち癒し系',desc:'真面目でコツコツ。仲間思いで仕事熱心。',traits:['真面目','努力','仲間思い','保守的'],compat:'猿・パンダ'}
];
const $=(id)=>document.getElementById(id);
function fillSel(id,from,to,suf){const s=$(id);for(let i=from;i<=to;i++){const o=document.createElement('option');o.value=i;o.textContent=i+suf;s.appendChild(o)}}
fillSel('y',1950,2025,'年');fillSel('m',1,12,'月');fillSel('d',1,31,'日');
const today=new Date();$('y').value=today.getFullYear()-25;$('m').value=today.getMonth()+1;$('d').value=today.getDate();
let lastA=null;
function go(){
  const y=parseInt($('y').value),m=parseInt($('m').value),d=parseInt($('d').value);
  let h=y*10000+m*100+d;
  h=((h*16777619)^0x811c9dc5)>>>0;
  const a=ANIMALS[h%ANIMALS.length];
  $('em').textContent=a.em;$('nm').textContent=a.nm;$('tag').textContent=a.tag;$('desc').textContent=a.desc;
  const t=$('traits');while(t.firstChild)t.removeChild(t.firstChild);
  a.traits.forEach(x=>{const s=document.createElement('span');s.textContent=x;t.appendChild(s)});
  const c=$('compat');while(c.firstChild)c.removeChild(c.firstChild);
  c.appendChild(document.createTextNode('相性◎: '));
  const b=document.createElement('b');b.textContent=a.compat;c.appendChild(b);
  $('result').classList.add('show');
  $('btn-share').disabled=false;
  lastA=a;
  fanfare();
}
let ac=null;const en=()=>{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();return ac};
const beep=(f,d,t='triangle',g=.13)=>{const a=en();const o=a.createOscillator();const gn=a.createGain();o.type=t;o.frequency.value=f;gn.gain.value=g;gn.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);o.connect(gn).connect(a.destination);o.start();o.stop(a.currentTime+d)};
const fanfare=()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.18),i*100))};
$('btn-go').addEventListener('click',()=>{en();go()});
$('btn-share').addEventListener('click',()=>{
  if(!lastA)return;
  const txt=`動物占い: ${lastA.em} ${lastA.nm}「${lastA.tag}」 #動物占い`;
  window.open(`https://x.com/intent/post?text=${encodeURIComponent(txt)}&url=${encodeURIComponent(SHARE_URL)}`,'_blank','noopener,noreferrer');
});
})();
</script>
</body>
</html>
